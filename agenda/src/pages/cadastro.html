<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReservaAí - Novo Agendamento</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>

    <header>
        <nav>
            <ul class="menu">
                <li><a href="../../index.html">Início</a></li>
                <li><a href="./cadastro.html" class="ativo">Novo Agendamento</a></li>
                <li><a href="./listagem.html">Calendário</a></li>
            </ul>
        </nav>
    </header>

    <main class="container-cadastro">
        <div class="form-box">
            <h2>Faça seu Agendamento</h2>
            <p>Preencha os dados abaixo para reservar o seu horário.</p>

            <form action="#" method="POST" id="form-agendamento">
                
                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                    </div>
                    <div class="input-group">
                        <label for="telefone">WhatsApp / Celular</label>
                        <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seuemail@exemplo.com" required>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="data">Data do Agendamento</label>
                        <input type="date" id="data" name="data" required>
                    </div>
                    <div class="input-group">
                        <label for="horario">Horário Disponível</label>
                        <select id="horario" name="horario" required>
                            <option value="" disabled selected>Escolha um horário</option>
                            <option value="08:00">08:00</option>
                            <option value="09:30">09:30</option>
                            <option value="10:00">10:00</option>
                            <option value="14:00">14:00</option>
                            <option value="15:30">15:30</option>
                            <option value="17:00">17:00</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn-principal btn-form">Confirmar Agendamento</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 ReservaAí. Desenvolvido por: <strong>Bruno Nóbrega Souza</strong> e <strong>Matheus Filipe da Silva Ponte</strong>.</p>
        <p>Projeto de Tecnologias Web - Unidades 1 e 2</p>
    </footer>
<script type="module" src="../js/cadastro.js"></script>
</body>
</html>
